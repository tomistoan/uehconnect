<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UEH Connect</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&amp;family=Space+Mono:wght@400;700&amp;display=swap" rel="stylesheet">
  <style>
html,body{margin:0;padding:0;height:100%;width:100%;overflow:hidden;font-family:'DM Sans',sans-serif}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#f0f2f5;--surface:#fff;--text:#1a1a2e;--text2:#5a5a7a;--accent:#6c5ce7;--accent2:#00b894;--danger:#e74c3c;--card-shadow:0 2px 16px rgba(0,0,0,.08);--nav-bg:rgba(255,255,255,.95)}
.dark{--bg:#0f0f1a;--surface:#1a1a2e;--text:#e8e8f0;--text2:#9a9ab0;--accent:#a29bfe;--accent2:#55efc4;--danger:#ff6b6b;--card-shadow:0 2px 16px rgba(0,0,0,.3);--nav-bg:rgba(26,26,46,.95)}
.app-root{background:var(--bg);color:var(--text);height:100%;width:100%;overflow:hidden;position:relative}
.surface{background:var(--surface)}
.txt2{color:var(--text2)}
.card-s{box-shadow:var(--card-shadow)}
.screen{position:absolute;inset:0;transition:transform .35s cubic-bezier(.4,0,.2,1),opacity .35s;will-change:transform,opacity}
.screen.hidden-r{transform:translateX(100%);opacity:0;pointer-events:none}
.screen.hidden-l{transform:translateX(-100%);opacity:0;pointer-events:none}
.screen.active{transform:translateX(0);opacity:1;pointer-events:auto}
.fade-in{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
@keyframes ripple{0%{box-shadow:0 0 0 0 rgba(108,92,231,.4)}100%{box-shadow:0 0 0 12px rgba(108,92,231,0)}}
.marker{cursor:pointer;transition:transform .2s}.marker:hover{transform:scale(1.2)}
.nav-item{transition:all .2s}.nav-item.active-nav .nav-icon{color:var(--accent)}.nav-item.active-nav .nav-label{color:var(--accent);font-weight:600}
input,textarea,select{background:var(--surface);color:var(--text);border:1.5px solid color-mix(in srgb,var(--text2) 30%,transparent);font-family:'DM Sans',sans-serif}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 20%,transparent)}
.btn-primary{background:var(--accent);color:#fff;border:none;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;font-weight:600}.btn-primary:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn-secondary{background:color-mix(in srgb,var(--accent) 15%,transparent);color:var(--accent);border:none;cursor:pointer;transition:all .2s;font-weight:600}.btn-secondary:hover{background:color-mix(in srgb,var(--accent) 25%,transparent)}
.chip{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;border:1.5px solid color-mix(in srgb,var(--text2) 20%,transparent)}.chip.selected{background:var(--accent);color:#fff;border-color:var(--accent)}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:color-mix(in srgb,var(--text2) 30%,transparent);border-radius:4px}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);padding:12px 24px;border-radius:12px;font-weight:500;z-index:9999;transition:transform .4s cubic-bezier(.4,0,.2,1);font-size:14px}.toast.show{transform:translateX(-50%) translateY(0)}
.toast-success{background:var(--accent2);color:#fff}.toast-info{background:var(--accent);color:#fff}
.pomodoro-ring{stroke-dasharray:283;stroke-dashoffset:0;transition:stroke-dashoffset 1s linear}
.grid-pattern{background-image:radial-gradient(circle,color-mix(in srgb,var(--text2) 15%,transparent) 1px,transparent 1px);background-size:24px 24px}
.map-bg{background:linear-gradient(135deg,#e8f5e9 0%,#e3f2fd 50%,#f3e5f5 100%)}.dark .map-bg{background:linear-gradient(135deg,#1a2e1a 0%,#1a1a2e 50%,#2e1a2e 100%)}
</style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="app" class="app-root"><!-- Toast -->
   <div id="toast" class="toast toast-info"></div><!-- LOGIN SCREEN -->
   <div id="screen-login" class="screen active" style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px">
    <div class="surface card-s" style="border-radius:24px;padding:32px;width:100%;max-width:400px">
     <div style="text-align:center;margin-bottom:28px">
      <div style="width:64px;height:64px;border-radius:18px;background:var(--accent);display:inline-flex;align-items:center;justify-content:center;margin-bottom:16px"><i data-lucide="map-pin" style="color:#fff;width:32px;height:32px"></i>
      </div>
      <h1 id="login-title" style="font-size:26px;font-weight:700;margin:0 0 4px" data-i18n="login_title">UEH Connect</h1>
      <p class="txt2" style="margin:0;font-size:14px" data-i18n="login_subtitle">Connect. Study. Thrive.</p>
     </div>
     <div id="login-form">
      <div style="margin-bottom:14px"><label for="login-email" style="font-size:13px;font-weight:500;display:block;margin-bottom:4px" data-i18n="email">Email</label> <input id="login-email" type="email" placeholder="student@campus.edu" style="width:100%;padding:10px 14px;border-radius:12px;font-size:14px">
      </div>
      <div style="margin-bottom:20px"><label for="login-pass" style="font-size:13px;font-weight:500;display:block;margin-bottom:4px" data-i18n="password">Password</label> <input id="login-pass" type="password" placeholder="••••••••" style="width:100%;padding:10px 14px;border-radius:12px;font-size:14px">
      </div><button class="btn-primary" onclick="doLogin()" style="width:100%;padding:12px;border-radius:12px;font-size:15px" data-i18n="sign_in">Sign In</button>
      <div style="text-align:center;margin:16px 0;font-size:13px" class="txt2">
       or
      </div><button class="btn-secondary" onclick="doLogin()" style="width:100%;padding:12px;border-radius:12px;font-size:14px;display:flex;align-items:center;justify-content:center;gap:8px">
       <svg width="18" height="18" viewbox="0 0 24 24">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4" /><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853" /><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05" /><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335" />
       </svg><span data-i18n="google_signin">Continue with Google</span> </button>
      <p style="text-align:center;margin-top:18px;font-size:13px" class="txt2"><span data-i18n="no_account">No account?</span> <a href="#" onclick="showSignup();return false" style="color:var(--accent);font-weight:600;text-decoration:none" data-i18n="sign_up_link">Sign Up</a></p>
     </div>
     <div id="signup-form" style="display:none">
      <div style="margin-bottom:12px"><label for="su-name" style="font-size:13px;font-weight:500;display:block;margin-bottom:4px" data-i18n="full_name">Full Name</label> <input id="su-name" type="text" placeholder="Alex Nguyen" style="width:100%;padding:10px 14px;border-radius:12px;font-size:14px">
      </div>
      <div style="margin-bottom:12px"><label for="su-email" style="font-size:13px;font-weight:500;display:block;margin-bottom:4px" data-i18n="email">Email</label> <input id="su-email" type="email" placeholder="alex@campus.edu" style="width:100%;padding:10px 14px;border-radius:12px;font-size:14px">
      </div>
      <div style="margin-bottom:12px"><label for="su-pass" style="font-size:13px;font-weight:500;display:block;margin-bottom:4px" data-i18n="password">Password</label> <input id="su-pass" type="password" placeholder="••••••••" style="width:100%;padding:10px 14px;border-radius:12px;font-size:14px">
      </div>
      <div style="margin-bottom:12px"><label style="font-size:13px;font-weight:500;display:block;margin-bottom:6px" data-i18n="major">Major</label> <select id="su-major" style="width:100%;padding:10px 14px;border-radius:12px;font-size:14px"> <option value="cs">Computer Science</option> <option value="eng">Engineering</option> <option value="bus">Business</option> <option value="art">Arts &amp; Design</option> <option value="sci">Sciences</option> <option value="med">Medicine</option> </select>
      </div>
      <div style="margin-bottom:16px"><label style="font-size:13px;font-weight:500;display:block;margin-bottom:6px" data-i18n="interests">Interests</label>
       <div id="interest-chips" style="display:flex;flex-wrap:wrap;gap:6px">
       </div>
      </div><button class="btn-primary" onclick="doSignup()" style="width:100%;padding:12px;border-radius:12px;font-size:15px" data-i18n="create_account">Create Account</button>
      <p style="text-align:center;margin-top:14px;font-size:13px" class="txt2"><span data-i18n="have_account">Have an account?</span> <a href="#" onclick="showLogin();return false" style="color:var(--accent);font-weight:600;text-decoration:none" data-i18n="sign_in_link">Sign In</a></p>
     </div>
    </div>
   </div><!-- MAIN APP SCREEN -->
   <div id="screen-main" class="screen hidden-r" style="display:flex;flex-direction:column;height:100%"><!-- Top Bar -->
    <header class="surface" style="padding:10px 16px;display:flex;align-items:center;justify-content:space-between;z-index:50;border-bottom:1px solid color-mix(in srgb,var(--text2) 12%,transparent)">
     <div style="display:flex;align-items:center;gap:10px">
      <div style="width:36px;height:36px;border-radius:12px;background:var(--accent);display:flex;align-items:center;justify-content:center"><i data-lucide="map-pin" style="color:#fff;width:18px;height:18px"></i>
      </div><span id="header-title" style="font-weight:700;font-size:17px">UEH Connect</span>
     </div>
     <div style="display:flex;align-items:center;gap:6px"><button onclick="toggleLang()" style="background:color-mix(in srgb,var(--accent) 12%,transparent);border:none;border-radius:10px;padding:6px 10px;font-size:12px;font-weight:600;color:var(--accent);cursor:pointer" id="lang-btn">EN</button> <button onclick="toggleTheme()" style="background:color-mix(in srgb,var(--accent) 12%,transparent);border:none;border-radius:10px;padding:6px 10px;font-size:16px;cursor:pointer" id="theme-btn">🌙</button> <button onclick="showNotifications()" style="background:none;border:none;cursor:pointer;position:relative;padding:6px"> <i data-lucide="bell" style="width:20px;height:20px;color:var(--text)"></i> <span style="position:absolute;top:2px;right:2px;width:8px;height:8px;background:var(--danger);border-radius:50%"></span> </button>
     </div>
    </header><!-- Main Content -->
    <div id="main-content" style="flex:1;overflow-y:auto;overflow-x:hidden;position:relative"><!-- MAP TAB -->
     <div id="tab-map" class="tab-content" style="height:100%;position:relative">
      <div class="map-bg" style="height:100%;position:relative;overflow:hidden"><!-- Map Grid -->
       <div class="grid-pattern" style="position:absolute;inset:0;opacity:.4"></div><!-- Map Roads -->
       <svg style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none" viewbox="0 0 400 600" preserveaspectratio="xMidYMid slice"><line x1="0" y1="200" x2="400" y2="200" stroke="color-mix(in srgb,var(--text2) 20%,transparent)" stroke-width="3" stroke-dasharray="8,4" /> <line x1="0" y1="400" x2="400" y2="400" stroke="color-mix(in srgb,var(--text2) 20%,transparent)" stroke-width="3" stroke-dasharray="8,4" /> <line x1="150" y1="0" x2="150" y2="600" stroke="color-mix(in srgb,var(--text2) 20%,transparent)" stroke-width="3" stroke-dasharray="8,4" /> <line x1="300" y1="0" x2="300" y2="600" stroke="color-mix(in srgb,var(--text2) 20%,transparent)" stroke-width="3" stroke-dasharray="8,4" /> <path d="M0,100 Q200,150 400,80" stroke="color-mix(in srgb,var(--text2) 15%,transparent)" stroke-width="2" fill="none" />
       </svg><!-- User Location -->
       <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:10">
        <div style="width:20px;height:20px;background:var(--accent);border-radius:50%;border:3px solid #fff;box-shadow:0 0 0 0 rgba(108,92,231,.4);animation:ripple 2s infinite"></div>
        <div style="position:absolute;top:-28px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:600;white-space:nowrap" data-i18n="you">
         You
        </div>
       </div><!-- Map Markers -->
       <div id="map-markers"></div><!-- Map Legend -->
       <div class="surface card-s" style="position:absolute;bottom:80px;left:12px;border-radius:14px;padding:10px 14px;font-size:11px;z-index:10">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
         <span style="width:10px;height:10px;border-radius:50%;background:#e74c3c;display:inline-block"></span><span data-i18n="alerts">Alerts</span>
        </div>
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
         <span style="width:10px;height:10px;border-radius:50%;background:#00b894;display:inline-block"></span><span data-i18n="places">Places</span>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
         <span style="width:10px;height:10px;border-radius:50%;background:#6c5ce7;display:inline-block"></span><span data-i18n="events">Events</span>
        </div>
       </div><!-- Post FAB --> <button onclick="showPostModal()" style="position:absolute;bottom:80px;right:16px;width:52px;height:52px;border-radius:16px;background:var(--accent);border:none;color:#fff;cursor:pointer;z-index:10;box-shadow:0 4px 16px rgba(108,92,231,.4);display:flex;align-items:center;justify-content:center"> <i data-lucide="plus" style="width:24px;height:24px"></i> </button> <!-- Quick Services -->
       <div style="position:absolute;bottom:12px;left:0;right:0;z-index:10;padding:0 12px">
        <div style="display:flex;gap:8px;overflow-x:auto;padding:4px 0;scrollbar-width:none" id="quick-services">
        </div>
       </div>
      </div>
     </div><!-- FEED TAB -->
     <div id="tab-feed" class="tab-content" style="display:none;padding:16px">
      <h2 style="font-size:20px;font-weight:700;margin:0 0 14px" data-i18n="community_feed">Community Feed</h2>
      <div id="feed-list"></div>
     </div><!-- STUDY TAB -->
     <div id="tab-study" class="tab-content" style="display:none;padding:16px">
      <h2 style="font-size:20px;font-weight:700;margin:0 0 14px" data-i18n="study_hub">Study Hub</h2><!-- Matching -->
      <div class="surface card-s" style="border-radius:16px;padding:16px;margin-bottom:14px">
       <h3 style="font-size:15px;font-weight:600;margin:0 0 10px;display:flex;align-items:center;gap:6px"><i data-lucide="users" style="width:16px;height:16px;color:var(--accent)"></i><span data-i18n="study_partners">Study Partners</span></h3>
       <div id="partner-list" style="display:flex;flex-direction:column;gap:10px"></div>
      </div><!-- Study Rooms -->
      <div class="surface card-s" style="border-radius:16px;padding:16px;margin-bottom:14px">
       <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <h3 style="font-size:15px;font-weight:600;margin:0;display:flex;align-items:center;gap:6px"><i data-lucide="book-open" style="width:16px;height:16px;color:var(--accent2)"></i><span data-i18n="study_rooms">Study Rooms</span></h3><button class="btn-primary" onclick="createRoom()" style="padding:6px 14px;border-radius:10px;font-size:12px" data-i18n="create_room">+ Create</button>
       </div>
       <div id="room-list" style="display:flex;flex-direction:column;gap:8px"></div>
      </div><!-- QA -->
      <div class="surface card-s" style="border-radius:16px;padding:16px;margin-bottom:14px">
       <h3 style="font-size:15px;font-weight:600;margin:0 0 10px;display:flex;align-items:center;gap:6px"><i data-lucide="help-circle" style="width:16px;height:16px;color:var(--danger)"></i><span data-i18n="qa_nearby">Q&amp;A Nearby</span></h3>
       <div style="display:flex;gap:8px;margin-bottom:10px"><input id="qa-input" type="text" placeholder="Ask nearby students..." style="flex:1;padding:10px 14px;border-radius:12px;font-size:13px" data-i18n-placeholder="ask_placeholder"> <button class="btn-primary" onclick="postQuestion()" style="padding:10px 16px;border-radius:12px;font-size:13px" data-i18n="ask">Ask</button>
       </div>
       <div id="qa-list" style="display:flex;flex-direction:column;gap:8px"></div>
      </div><!-- Productivity -->
      <div class="surface card-s" style="border-radius:16px;padding:16px">
       <h3 style="font-size:15px;font-weight:600;margin:0 0 10px;display:flex;align-items:center;gap:6px"><i data-lucide="target" style="width:16px;height:16px;color:var(--accent)"></i><span data-i18n="productivity">Productivity</span></h3>
       <div id="goals-section"></div>
       <div style="margin-top:12px">
        <h4 style="font-size:13px;font-weight:600;margin:0 0 8px" class="txt2" data-i18n="leaderboard">🏆 Leaderboard</h4>
        <div id="leaderboard"></div>
       </div>
      </div>
     </div><!-- MESSAGES TAB -->
     <div id="tab-messages" class="tab-content" style="display:none;padding:16px">
      <h2 style="font-size:20px;font-weight:700;margin:0 0 14px" data-i18n="messages">Messages</h2>
      <div id="chat-list"></div>
     </div><!-- PROFILE TAB -->
     <div id="tab-profile" class="tab-content" style="display:none;padding:16px">
      <div id="profile-content"></div>
     </div>
    </div><!-- Bottom Nav -->
    <nav class="surface" style="display:flex;border-top:1px solid color-mix(in srgb,var(--text2) 12%,transparent);padding:6px 0 10px;z-index:50"><button class="nav-item active-nav" onclick="switchTab('map')" style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;padding:4px" data-tab="map"> <i data-lucide="map" class="nav-icon" style="width:20px;height:20px"></i> <span class="nav-label" style="font-size:10px" data-i18n="map">Map</span> </button> <button class="nav-item" onclick="switchTab('feed')" style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;padding:4px" data-tab="feed"> <i data-lucide="newspaper" class="nav-icon" style="width:20px;height:20px"></i> <span class="nav-label" style="font-size:10px" data-i18n="feed">Feed</span> </button> <button class="nav-item" onclick="switchTab('study')" style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;padding:4px" data-tab="study"> <i data-lucide="book-open" class="nav-icon" style="width:20px;height:20px"></i> <span class="nav-label" style="font-size:10px" data-i18n="study">Study</span> </button> <button class="nav-item" onclick="switchTab('messages')" style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;padding:4px;position:relative" data-tab="messages"> <i data-lucide="message-circle" class="nav-icon" style="width:20px;height:20px"></i> <span class="nav-label" style="font-size:10px" data-i18n="chats">Chats</span> <span style="position:absolute;top:2px;right:calc(50% - 16px);width:7px;height:7px;background:var(--danger);border-radius:50%"></span> </button> <button class="nav-item" onclick="switchTab('profile')" style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;padding:4px" data-tab="profile"> <i data-lucide="user" class="nav-icon" style="width:20px;height:20px"></i> <span class="nav-label" style="font-size:10px" data-i18n="profile">Profile</span> </button>
    </nav>
   </div><!-- MODALS OVERLAY -->
   <div id="modal-overlay" style="display:none;position:absolute;inset:0;background:rgba(0,0,0,.5);z-index:100;display:none;align-items:flex-end;justify-content:center">
    <div id="modal-content" class="surface" style="width:100%;max-width:500px;border-radius:24px 24px 0 0;padding:24px;max-height:85%;overflow-y:auto">
    </div>
   </div><!-- STUDY ROOM SCREEN -->
   <div id="screen-room" class="screen hidden-r" style="display:flex;flex-direction:column;height:100%">
    <header class="surface" style="padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid color-mix(in srgb,var(--text2) 12%,transparent)"><button onclick="closeRoom()" style="background:none;border:none;cursor:pointer"><i data-lucide="arrow-left" style="width:20px;height:20px;color:var(--text)"></i></button>
     <div>
      <div id="room-title" style="font-weight:600;font-size:15px"></div>
      <div id="room-members" class="txt2" style="font-size:12px"></div>
     </div>
    </header>
    <div style="flex:1;display:flex;flex-direction:column;overflow:hidden"><!-- Pomodoro -->

<div style="display:flex;justify-content:space-between;align-items:start">
<div>
<div style="font-weight:600;font-size:14px">${r.name}</div>
<div class="txt2" style="font-size:12px">${r.topic} • ${r.members.length} members</div>
<div style="display:flex;gap:-4px;margin-top:6px">${r.members.map(m=>`<span style="font-size:16px">${m}</span>`).join(' ')}</div>
</div>
<button class="btn-primary" onclick="joinRoom(${i})" style="padding:6px 14px;border-radius:10px;font-size:12px">${t('join')}</button>
</div>
</div>`;
}
function renderRooms(){document.getElementById('room-list').innerHTML=studyRooms.map((r,i)=>renderRoomCard(r,i)).join('')}
function createRoom(){
const name=`Study Room ${studyRooms.length+1}`;
studyRooms.unshift({name,members:['🧑‍💻'],topic:'General',active:true});
renderRooms();showToast(t('room_created'),'success');
}
function joinRoom(i){
currentRoom=studyRooms[i];
document.getElementById('room-title').textContent=currentRoom.name;
document.getElementById('room-members').textContent=`${currentRoom.members.length} members • ${currentRoom.topic}`;
document.getElementById('room-chat').innerHTML=`
<div style="text-align:center;padding:20px" class="txt2"><div style="font-size:28px;margin-bottom:8px">📚</div><div style="font-size:13px">Welcome to ${currentRoom.name}!</div></div>`;
resetPomodoro();
navigateTo('screen-room');setTimeout(()=>lucide.createIcons(),50);
}
function closeRoom(){navigateBack('screen-room','screen-main');setTimeout(()=>lucide.createIcons(),50)}
function sendRoomMsg(){
const input=document.getElementById('room-msg-input');if(!input.value.trim())return;
const chat=document.getElementById('room-chat');
chat.innerHTML+=`<div style="align-self:flex-end;background:var(--accent);color:#fff;padding:8px 14px;border-radius:14px 14px 4px 14px;max-width:75%;font-size:13px">${input.value}</div>`;
const msg=input.value;input.value='';chat.scrollTop=chat.scrollHeight;
setTimeout(()=>{
const replies=['Great point! 👍','Let me check that...','I agree!','Can you explain more?','Nice work! 🎉'];
chat.innerHTML+=`<div style="display:flex;gap:8px;align-items:end"><span style="font-size:16px">${currentRoom.members[0]}</span><div style="background:var(--surface);border:1px solid color-mix(in srgb,var(--text2) 15%,transparent);padding:8px 14px;border-radius:14px 14px 14px 4px;max-width:75%;font-size:13px">${replies[Math.floor(Math.random()*replies.length)]}</div></div>`;
chat.scrollTop=chat.scrollHeight;

// ===== POMODORO =====
function togglePomodoro(){
if(pomoRunning){clearInterval(pomoInterval);pomoRunning=false;document.getElementById('pomo-btn').textContent=t('start')}
else{pomoRunning=true;document.getElementById('pomo-btn').textContent='Pause';pomoInterval=setInterval(()=>{
pomoSeconds--;if(pomoSeconds<=0){clearInterval(pomoInterval);pomoRunning=false;pomoSeconds=1500;showToast('🎉 Pomodoro complete!','success')}
updatePomoDisplay()},1000)}
}
function resetPomodoro(){clearInterval(pomoInterval);pomoRunning=false;pomoSeconds=1500;updatePomoDisplay();document.getElementById('pomo-btn').textContent=t('start')}
function updatePomoDisplay(){
const m=Math.floor(pomoSeconds/60),s=pomoSeconds%60;
document.getElementById('pomo-time').textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
const pct=(1500-pomoSeconds)/1500;
document.getElementById('pomo-ring').style.strokeDashoffset=283-(283*pct);
}
